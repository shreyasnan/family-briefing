<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Family Briefing</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #f5f0eb;
      padding: 2rem;
    }
    .hub {
      text-align: center;
      max-width: 360px;
    }
    h1 {
      font-size: 1.5rem;
      font-weight: 700;
      margin-bottom: 0.5rem;
      color: #1a1a2e;
    }
    p {
      color: #6b7280;
      font-size: 0.9rem;
      margin-bottom: 2rem;
    }
    .links {
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }
    a {
      display: block;
      padding: 1.25rem 1.5rem;
      border-radius: 1rem;
      text-decoration: none;
      color: white;
      font-weight: 600;
      font-size: 1.1rem;
      transition: transform 0.15s, box-shadow 0.15s;
      box-shadow: 0 2px 8px rgba(0,0,0,0.12);
    }
    a:active { transform: scale(0.98); }
    .shreyas { background: linear-gradient(135deg, #1e3a5f, #2563eb); }
    .pragya  { background: linear-gradient(135deg, #5b21b6, #7c3aed); }
    .sub { font-weight: 400; font-size: 0.8rem; opacity: 0.8; display: block; margin-top: 0.25rem; }
  </style>
</head>
<body>
  <div class="hub">
    <h1>Family Briefing</h1>
    <p>Choose your daily morning briefing</p>
    <div class="links">
      <a href="shreyas.html" class="shreyas">Shreyas <span class="sub">Schedule, weather & logistics</span></a>
      <a href="pragya.html" class="pragya">Pragya <span class="sub">Schedule, weather & logistics</span></a>
    </div>
  </div>
</body>
</html>
